<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Previous Visits — Eave Health</title>
  <link rel="stylesheet" href="/shared/theme.css" />
  <style>
    .timeline-item {
      position: relative;
      padding: 20px 20px 20px 44px;
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      background: var(--surface);
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .timeline-item:hover { border-color: #2a2a2a; }

    .timeline-dot {
      position: absolute;
      left: 18px;
      top: 24px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .timeline-item h3 {
      font-size: 14px;
      font-weight: 600;
      color: white;
      margin: 0 0 4px;
    }

    .timeline-item .meta {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      margin: 0 0 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .timeline-item .meta .status-pill {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 2px 7px;
      border-radius: 99px;
    }
    .status-pill.completed { background: rgba(74,222,128,0.1); color: #4ade80; }
    .status-pill.scheduled { background: rgba(129,140,248,0.1); color: #818cf8; }
    .status-pill.visit     { background: rgba(251,146,60,0.1);  color: #fb923c; }

    .timeline-item p.notes {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      margin: 0;
    }

    .notes-section { margin-top: 10px; }
    .notes-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .timeline-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .timeline-empty svg {
      width: 36px; height: 36px;
      margin-bottom: 12px;
      opacity: 0.3;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .skeleton {
      background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 14px;
      margin-bottom: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .filter-btn {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 6px 14px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: white;
      color: white;
      background: rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>
  <div class="page-wrapper grid-bg">
    <div class="main-content">
      <div class="page-inner fade-in">

        <!-- Action Bar -->
        <div class="action-bar">
          <div class="badge">VISITS_HISTORY</div>
          <div class="spacer"></div>
          <span id="visit-count" style="font-size:11px;color:var(--text-dim);font-family:var(--font-mono);"></span>
        </div>

        <!-- Header -->
        <div class="page-header">
          <p class="subtitle">Chronological Record</p>
          <h1>Previous Checkups</h1>
        </div>

        <!-- Filter -->
        <div class="filter-bar">
          <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
          <button class="filter-btn" onclick="setFilter('appointment', this)">Appointments</button>
          <button class="filter-btn" onclick="setFilter('visit', this)">Clinical Visits</button>
        </div>

        <!-- Timeline -->
        <div class="timeline" id="timeline">
          <!-- skeleton -->
          <div class="timeline-item" id="skel-1">
            <div class="timeline-dot" style="background:#333;"></div>
            <div class="skeleton" style="width:40%;height:13px;"></div>
            <div class="skeleton" style="width:25%;height:10px;margin-bottom:12px;"></div>
            <div class="skeleton" style="width:90%;"></div>
            <div class="skeleton" style="width:75%;"></div>
          </div>
          <div class="timeline-item" id="skel-2">
            <div class="timeline-dot" style="background:#333;"></div>
            <div class="skeleton" style="width:35%;height:13px;"></div>
            <div class="skeleton" style="width:22%;height:10px;margin-bottom:12px;"></div>
            <div class="skeleton" style="width:85%;"></div>
            <div class="skeleton" style="width:60%;"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="/shared/nav.js"></script>
  <script>EaveNav.init('visits');</script>
  <script src="/shared/api.js"></script>
  <script src="/shared/app.js"></script>
  <script>
    EaveAPI.requireAuth('patient');
    EaveApp.init();

    let allItems = [];
    let activeFilter = 'all';

    // ── Helpers ────────────────────────────────────────────────────────────────
    function formatDate(iso) {
      if (!iso) return 'Unknown date';
      const d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function dotColor(type, status) {
      if (type === 'visit')        return '#fb923c';
      if (status === 'completed')  return 'white';
      if (status === 'scheduled')  return '#818cf8';
      return '#4b5563';
    }

    function renderItem(item) {
      const isVisit = item._type === 'visit';
      const dot     = dotColor(item._type, item.status);

      // Title line
      const title = item.medic_name
        ? item.medic_name
        : (item.department || item.reason || 'Clinical Record');

      // Meta line
      const dateStr  = formatDate(item._date);
      const dept     = item.department || item.medic_specialty || '';
      const pillType = isVisit ? 'visit' : item.status;
      const pillText = isVisit ? 'Visit Note' : (item.status || 'appointment');

      // Notes block — pull whichever fields have content
      let notesHTML = '';
      if (isVisit) {
        const sections = [
          { label: 'Diagnosis',    text: item.diagnosis_notes },
          { label: 'Prescription', text: item.prescription_notes },
          { label: 'Notes',        text: item.clinical_notes },
        ].filter(s => s.text);

        if (sections.length) {
          notesHTML = sections.map(s => `
            <div class="notes-section">
              <div class="notes-label">${s.label}</div>
              <p class="notes">${s.text}</p>
            </div>`).join('');
        } else {
          notesHTML = `<p class="notes" style="color:var(--text-dim);">No notes recorded for this visit.</p>`;
        }
      } else {
        // Appointment — show reason
        const text = item.reason || 'No reason recorded.';
        notesHTML = `<p class="notes">${text}</p>`;
      }

      return `
        <div class="timeline-item" data-type="${item._type}" data-status="${item.status || ''}">
          <div class="timeline-dot" style="background:${dot};"></div>
          <h3>${title}</h3>
          <p class="meta">
            ${dateStr}${dept ? ' · ' + dept : ''}
            <span class="status-pill ${pillType}">${pillText}</span>
          </p>
          ${notesHTML}
        </div>`;
    }

    function render() {
      const timeline = document.getElementById('timeline');
      const filtered = activeFilter === 'all'
        ? allItems
        : allItems.filter(i => i._type === activeFilter);

      document.getElementById('visit-count').textContent =
        `${filtered.length} record${filtered.length !== 1 ? 's' : ''}`;

      if (!filtered.length) {
        timeline.innerHTML = `
          <div class="timeline-empty">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
                   M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            No records found.
          </div>`;
        return;
      }

      timeline.innerHTML = filtered.map(renderItem).join('');
    }

    function setFilter(type, btn) {
      activeFilter = type;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    // ── Load data ──────────────────────────────────────────────────────────────
    (async function loadVisits() {
      try {
        // Fetch both in parallel
        const [appointments, visits] = await Promise.all([
          EaveAPI.getAppointments(),
          EaveAPI.getVisits(),
        ]);

        // Normalise appointments
        const apptItems = (appointments || []).map(a => ({
          ...a,
          _type: 'appointment',
          _date: a.scheduled_at,
        }));

        // Normalise clinical visits
        const visitItems = (visits || []).map(v => ({
          ...v,
          _type: 'visit',
          _date: v.visited_at,
        }));

        // Merge + sort newest first
        allItems = [...apptItems, ...visitItems].sort(
          (a, b) => new Date(b._date) - new Date(a._date)
        );

        render();

      } catch (err) {
        console.warn('Visits load error:', err.message);
        document.getElementById('timeline').innerHTML = `
          <div class="timeline-empty">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            Could not load visit history. Try refreshing.
          </div>`;
      }
    })();
  </script>
</body>
</html>
