<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — Eave Health</title>
  <link rel="stylesheet" href="/shared/theme.css" />
  <style>
    /* ── Full-height chat layout, no page scroll ── */
    html, body {
      height: 100%;
      overflow: hidden;
    }

    .page-wrapper {
      height: 100vh;
      overflow: hidden;
    }

    .main-content {
      height: 100vh;
      overflow: hidden;
      padding-bottom: 0 !important;
      display: flex;
      flex-direction: column;
    }

    /* ── Chat shell: takes full remaining height ── */
    .chat-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    /* ── Top fade so messages don't hard-cut at top ── */
    .chat-shell::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to bottom, var(--bg) 30%, transparent 100%);
      pointer-events: none;
      z-index: 5;
    }

    /* ── Scrollable messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 72px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    .chat-messages-inner {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── Empty / welcome state ── */
    .chat-welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      padding-bottom: 8px;
      gap: 6px;
    }
    .chat-welcome.hidden { display: none; }

    .welcome-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }
    .welcome-name {
      font-size: 26px;
      font-weight: 600;
      color: white;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .welcome-sub {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 420px;
      margin-top: 4px;
    }

    /* Quick prompt chips */
    .quick-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .quick-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-sans);
    }
    .quick-chip:hover {
      border-color: #333;
      color: var(--text);
      background: #161616;
    }
    .quick-chip svg { opacity: 0.5; flex-shrink: 0; }
    .quick-chip:hover svg { opacity: 0.8; }

    /* ── Message blocks ── */
    .msg-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: msgIn 0.2s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.restored { animation: none; }

    .msg-row.user { align-items: flex-end; }
    .msg-row.agent { align-items: flex-start; }

    /* User bubble */
    .msg-bubble-user {
      max-width: 72%;
      background: #1a1a1a;
      border: 1px solid #282828;
      border-radius: 16px 16px 4px 16px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.65;
      color: var(--text);
    }

    /* Agent message — labelless, clean */
    .msg-agent-wrap {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      max-width: 88%;
    }
    .agent-avatar {
      width: 26px;
      height: 26px;
      background: #0d1f14;
      border: 1px solid #1a3a24;
      border-radius: 8px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .agent-avatar svg { color: #4ade80; }

    .msg-bubble-agent {
      font-size: 14.5px;
      line-height: 1.75;
      color: #c9d1dc;
      padding-top: 2px;
    }

    /* Typing indicator */
    .typing-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }
    .typing-dot {
      width: 5px;
      height: 5px;
      background: #374151;
      border-radius: 50%;
      animation: typePulse 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typePulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1); }
    }

    /* ── Fixed bottom input area ── */
    .chat-dock {
      flex-shrink: 0;
      padding: 0 20px 24px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      position: relative;
      z-index: 10;
    }

    /* Bottom fade behind input */
    .chat-dock::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 140%;
      background: linear-gradient(to top, var(--bg) 60%, transparent 100%);
      pointer-events: none;
      z-index: -1;
    }

    .dock-inner {
      max-width: 680px;
      margin: 0 auto;
    }

    .input-box {
      background: #111;
      border: 1px solid #242424;
      border-radius: 16px;
      padding: 12px 12px 12px 16px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      transition: border-color 0.2s;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }
    .input-box:focus-within {
      border-color: #2e2e2e;
    }

    .input-ta {
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font-sans);
      font-size: 14px;
      color: white;
      caret-color: white;
      color-scheme: dark;
      line-height: 1.6;
      min-height: 24px;
      max-height: 160px;
      padding: 0;
      flex: 1;
    }

    .input-ta::selection {
      background: transparent;
    }

    .input-ta::placeholder { color: #374151; }

    .send-btn {
      width: 34px;
      height: 34px;
      background: #1e1e1e;
      color: #6b7280;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      display: grid;
      place-items: center;
      cursor: not-allowed;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .send-btn:not([disabled]) {
      background: white;
      color: black;
      border-color: white;
      cursor: pointer;
    }
    .send-btn:not([disabled]):hover {
      opacity: 0.88;
      transform: scale(1.04);
    }

    /* ── Responsive ── */
    @media (max-width: 767px) {
      .chat-messages { padding: 60px 14px 16px; }
      .chat-dock { padding: 0 12px 16px; padding-bottom: max(16px, env(safe-area-inset-bottom)); }
      .msg-bubble-user { max-width: 88%; font-size: 14px; }
      .msg-bubble-agent { font-size: 14px; }
      .msg-agent-wrap { max-width: 100%; }
      .welcome-name { font-size: 22px; }
      .quick-chips { gap: 6px; }
      .quick-chip { font-size: 12px; padding: 7px 12px; }
    }

    @media (min-width: 768px) {
      .main-content { padding-bottom: 0 !important; }
    }
  </style>
</head>
<body>
  <div class="page-wrapper grid-bg">
    <div class="main-content">
      <div class="chat-shell">

        <!-- Scrollable message area -->
        <div class="chat-messages" id="chat-messages">
          <div class="chat-messages-inner" id="msgs-inner">

            <!-- Welcome state -->
            <div class="chat-welcome" id="chat-welcome">
              <div class="welcome-eyebrow">Eave Health · AI</div>
              <div class="welcome-name">Hey John, what's on your mind?</div>
              <div class="welcome-sub">I have your full health context — vitals, meds, upcoming appointments. Ask me anything.</div>
              <div class="quick-chips" id="quick-chips">
                <button class="quick-chip" onclick="sendChip('How are my vitals looking?')">
                  <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12h4l3-9 4 18 3-9h4"/></svg>
                  Vitals check
                </button>
                <button class="quick-chip" onclick="sendChip('What meds do I need to take today?')">
                  <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6M12 9v6m-7 3a9 9 0 1118 0 9 9 0 01-18 0z"/></svg>
                  Today's meds
                </button>
                <button class="quick-chip" onclick="sendChip('What are my upcoming appointments?')">
                  <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                  Appointments
                </button>
                <button class="quick-chip" onclick="sendChip('What should I eat today based on my diet plan?')">
                  <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h18M3 7h18M3 11h10"/></svg>
                  Diet advice
                </button>
              </div>
            </div>

          </div>
        </div>

        <!-- Fixed bottom dock -->
        <div class="chat-dock">
          <div class="dock-inner">
            <div class="input-box">
              <textarea
                id="chat-ta"
                class="input-ta"
                placeholder="Ask about your health…"
                rows="1"
              ></textarea>
              <button class="send-btn" id="send-btn" disabled>
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="/shared/nav.js"></script>
  <script>EaveNav.init('agent');</script>
  <script src="/shared/api.js"></script>
  <script src="/shared/app.js"></script>
  <script>EaveApp.init();</script>

  <script>
    EaveAPI.requireAuth('patient');

    // ── Patient context — loaded dynamically from API ──────────────────
    let PATIENT_CONTEXT = `You are the Eave Health AI — a calm, knowledgeable health companion embedded in a patient portal. You do not yet have the patient's data loaded. Ask them how you can help.`;

    // Load real patient data into context
    (async function loadContext() {
      try {
        const d = await EaveAPI.getDashboard();
        const p = d.profile || {};
        const v = (d.vitals && d.vitals[0]) || {};
        const l = (d.labs && d.labs[0]) || {};
        const conds = (d.conditions || []).map(c => `- ${c.condition_name}${c.notes ? ' — ' + c.notes : ''}`).join('\n') || 'None on record';
        const meds = (d.medications || []).map(m => `- ${m.drug_name} ${m.dosage || ''} — ${m.frequency || ''}`).join('\n') || 'None active';
        const appts = (d.appointments || []).map(a => `- ${a.reason || 'Appointment'} on ${a.scheduled_at}${a.medic_name ? ' with ' + a.medic_name : ''}`).join('\n') || 'None scheduled';
        const rxNotes = (d.clinical_visits || [])
          .filter(v => v.prescription_notes)
          .map(v => `- ${v.visited_at ? v.visited_at.split('T')[0] : 'Unknown date'}${v.medic_name ? ' (Dr. ' + v.medic_name + ')' : ''}: ${v.prescription_notes}`)
          .join('\n') || 'None on record';
        const scores = (d.health_scores && d.health_scores[0]) ? `Health Score: ${d.health_scores[0].score}/10` : '';
        const preds = (d.predictions && d.predictions[0]) ? `Diabetes risk: ${d.predictions[0].diabetes_risk}, Hypertension risk: ${d.predictions[0].hypertension_risk}` : '';

        PATIENT_CONTEXT = `You are the Eave Health AI — a calm, knowledgeable health companion embedded in a patient portal.
You have full context on ${p.full_name || 'this patient'} (ID: ${p.patient_code || 'unknown'}):

ACTIVE CONDITIONS:
${conds}

CURRENT VITALS (last recorded):
- Blood Pressure: ${v.systolic_bp || '—'}/${v.diastolic_bp || '—'} mmHg
- Heart Rate: ${v.heart_rate || '—'} bpm
- Weight: ${v.weight_kg || '—'} kg
- BMI: ${v.bmi || '—'}

RECENT LABS:
- Fasting glucose: ${l.fasting_glucose || '—'} mg/dL
- HbA1c: ${l.hba1c || '—'}%
- Total cholesterol: ${l.total_cholesterol || '—'} mg/dL
- LDL: ${l.ldl_cholesterol || '—'} mg/dL

PRESCRIPTIONS:
${meds}

PRESCRIPTION NOTES FROM DOCTOR VISITS:
${rxNotes}

UPCOMING:
${appts}

${scores}
${preds}

Tone: be direct, warm, and human. Plain prose, no bullet points unless listing clearly distinct items. Keep replies concise — under 3 sentences for simple questions. If the patient seems stressed or uncertain, be reassuring but honest.

IMPORTANT: You already have the patient's full profile above — name, DOB, conditions, vitals, meds, appointments. NEVER ask the patient to confirm details you already have. When they request actions like scheduling an appointment, use the data you have and only ask for information you genuinely don't have (like preferred time, reason for visit, or which doctor). Act like a companion who already knows them, not a receptionist starting from scratch.`.trim();
      } catch (err) {
        console.warn('Could not load patient context:', err.message);
      }
    })();

    // ── State ──────────────────────────────────────────────────────
    const HISTORY_KEY = 'eave_chat_history';
    let history = (() => {
      try { return JSON.parse(sessionStorage.getItem(HISTORY_KEY)) || []; } catch { return []; }
    })();
    let chatStarted = history.length > 0;

    const ta       = document.getElementById('chat-ta');
    const sendBtn  = document.getElementById('send-btn');
    const msgWrap  = document.getElementById('msgs-inner');
    const welcome  = document.getElementById('chat-welcome');
    const scroller = document.getElementById('chat-messages');

    // ── Auto-resize textarea ───────────────────────────────────────
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
      sendBtn.disabled = !ta.value.trim();
    });

    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    sendBtn.addEventListener('click', send);

    // ── Chip shortcut ──────────────────────────────────────────────
    function sendChip(text) {
      ta.value = text;
      ta.style.height = 'auto';
      sendBtn.disabled = false;
      send();
    }

    // ── Append message ─────────────────────────────────────────────
    function addUserMsg(text) {
      if (!chatStarted) {
        chatStarted = true;
        welcome.classList.add('hidden');
      }
      const row = document.createElement('div');
      row.className = 'msg-row user';
      row.innerHTML = `<div class="msg-bubble-user">${esc(text).replace(/\n/g,'<br>')}</div>`;
      msgWrap.appendChild(row);
      scrollBottom();
      return row;
    }

    function addAgentMsg(text) {
      const row = document.createElement('div');
      row.className = 'msg-row agent';
      row.innerHTML = `
        <div class="msg-agent-wrap">
          <div class="agent-avatar">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          </div>
          <div class="msg-bubble-agent">${renderText(text)}</div>
        </div>`;
      msgWrap.appendChild(row);
      scrollBottom();
      return row;
    }

    function addTyping() {
      const row = document.createElement('div');
      row.className = 'msg-row agent';
      row.id = 'typing';
      row.innerHTML = `
        <div class="msg-agent-wrap typing-wrap">
          <div class="agent-avatar">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          </div>
          <div class="typing-dots">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>`;
      msgWrap.appendChild(row);
      scrollBottom();
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    // ── Send ───────────────────────────────────────────────────────
    async function send() {
      const text = ta.value.trim();
      if (!text || sendBtn.disabled) return;

      ta.value = '';
      ta.style.height = 'auto';
      sendBtn.disabled = true;

      addUserMsg(text);
      history.push({ role: 'user', content: text });
      sessionStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      addTyping();

      try {
        const data = await EaveAPI.post('/api/chat', {
            system: PATIENT_CONTEXT,
            messages: history
        });

        const reply = data.reply || 'Something went wrong — please try again.';
        history.push({ role: 'assistant', content: reply });
        sessionStorage.setItem(HISTORY_KEY, JSON.stringify(history));

        removeTyping();
        addAgentMsg(reply);
      } catch (err) {
        removeTyping();
        addAgentMsg('Connection issue. Please try again in a moment.');
        console.error(err);
      }

      ta.focus();
    }

    // ── Helpers ────────────────────────────────────────────────────
    function scrollBottom() {
      requestAnimationFrame(() => { scroller.scrollTop = scroller.scrollHeight; });
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = String(s);
      return d.innerHTML;
    }

    function renderText(t) {
      return esc(t)
        .replace(/\*\*(.+?)\*\*/g, '<strong style="color:white;font-weight:500">$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');
    }

    // Restore previous chat session if any
    function restoreHistory() {
      if (history.length === 0) return;
      welcome.classList.add('hidden');
      for (const msg of history) {
        if (msg.role === 'user') {
          const row = document.createElement('div');
          row.className = 'msg-row user restored';
          row.innerHTML = `<div class="msg-bubble-user">${esc(msg.content).replace(/\n/g,'<br>')}</div>`;
          msgWrap.appendChild(row);
        } else if (msg.role === 'assistant') {
          const row = document.createElement('div');
          row.className = 'msg-row agent restored';
          row.innerHTML = `
            <div class="msg-agent-wrap">
              <div class="agent-avatar">
                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
              </div>
              <div class="msg-bubble-agent">${renderText(msg.content)}</div>
            </div>`;
          msgWrap.appendChild(row);
        }
      }
      scrollBottom();
    }

    // Focus input on load
    window.addEventListener('load', () => { restoreHistory(); ta.focus(); });
  </script>
</body>
</html>
