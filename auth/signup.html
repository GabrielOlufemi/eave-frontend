<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Eave Health</title>
  <link rel="stylesheet" href="../shared/theme.css" />
  <style>
    body { min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 48px 24px; }

    .auth-center {
      width: 100%; max-width: 480px;
      animation: fadeIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .auth-brand {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 48px;
    }
    .auth-brand-icon { width: 32px; height: 32px; background: white; color: black; font-weight: 700; font-size: 16px; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
    .auth-brand span { color: white; font-weight: 500; font-size: 15px; letter-spacing: 0.05em; }

    .auth-heading { margin-bottom: 40px; }
    .auth-heading h1 { font-size: 24px; font-weight: 600; color: white; letter-spacing: -0.02em; margin-bottom: 8px; }
    .auth-heading p { font-size: 14px; color: var(--text-muted); }

    /* Step indicator */
    .steps {
      display: flex; align-items: center; gap: 0;
      margin-bottom: 40px;
    }
    .step-item { display: flex; align-items: center; gap: 8px; flex: 1; }
    .step-num {
      width: 24px; height: 24px; border-radius: 50%;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--text-dim);
      transition: var(--transition); flex-shrink: 0;
    }
    .step-num.active { border-color: #555; color: white; background: rgba(255,255,255,0.05); }
    .step-num.done { background: white; color: black; border-color: white; }
    .step-label { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.2s; }
    .step-label.active { color: var(--text); }
    .step-connector { flex: 1; height: 1px; background: var(--border); margin: 0 12px; max-width: 32px; }

    /* Form layout */
    .form-step { display: none; flex-direction: column; gap: 16px; }
    .form-step.active { display: flex; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); padding-left: 4px; }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .role-select-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .role-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; padding: 20px 12px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); cursor: pointer; transition: var(--transition);
      color: var(--text-muted); font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .role-btn svg { width: 24px; height: 24px; }
    .role-btn .role-title { color: var(--text); font-size: 13px; font-weight: 600; }
    .role-btn .role-desc { font-size: 10px; text-transform: none; letter-spacing: 0; color: var(--text-dim); text-align: center; line-height: 1.5; font-weight: 400; }
    .role-btn:hover { background: #1a1a1a; border-color: #333; }
    .role-btn.selected { border-color: #555; background: #1e1e1e; }
    .role-btn.selected svg { color: white; }
    .role-btn.selected .role-title { color: white; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 4px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }

    .btn-row { display: flex; gap: 12px; margin-top: 8px; }
    .btn-row .btn { flex: 1; padding: 14px; font-size: 14px; }

    .auth-footer { margin-top: 24px; text-align: center; font-size: 13px; color: var(--text-muted); }
    .auth-footer a { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--border); transition: border-color 0.2s; }
    .auth-footer a:hover { border-color: #555; color: white; }

    .error-msg {
      font-size: 12px; color: #f87171; font-family: var(--font-mono);
      padding: 10px 14px; background: rgba(127,29,29,0.2);
      border: 1px solid rgba(127,29,29,0.4); border-radius: var(--radius-md);
      display: none;
    }
    .error-msg.show { display: block; }

    .hint { font-size: 12px; color: var(--text-dim); padding-left: 4px; }

    select {
      width: 100%;
      background: var(--surface-2); color: var(--text-white);
      border: 1px solid var(--border); border-radius: var(--radius-md);
      font-family: var(--font-mono); font-size: 13px;
      padding: 12px 16px; outline: none; transition: var(--transition);
      cursor: pointer; appearance: none;
    }
    select:focus { border-color: #555; background: #1a1a1a; }
    select option { background: #111; }
  </style>
</head>
<body class="grid-bg">

  <div class="auth-center">

    <div class="auth-brand">
      <div class="auth-brand-icon">E</div>
      <span>Eave Health</span>
    </div>

    <div class="auth-heading">
      <h1>Create your account</h1>
      <p>Join Eave Health and take control of your health data.</p>
    </div>

    <!-- Step Indicator -->
    <div class="steps" id="step-indicator">
      <div class="step-item">
        <div class="step-num active" id="s1">1</div>
        <span class="step-label active" id="sl1">Account type</span>
      </div>
      <div class="step-connector"></div>
      <div class="step-item">
        <div class="step-num" id="s2">2</div>
        <span class="step-label" id="sl2">Your details</span>
      </div>
      <div class="step-connector"></div>
      <div class="step-item">
        <div class="step-num" id="s3">3</div>
        <span class="step-label" id="sl3">Health profile</span>
      </div>
    </div>

    <!-- Step 1: Role -->
    <div class="form-step active" id="step-1">
      <div class="field">
        <label>I am registering as</label>
        <div class="role-select-group">
          <button class="role-btn" id="role-patient" onclick="selectRole('patient')">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="role-title">Patient</span>
            <span class="role-desc">Personal health tracking and appointments</span>
          </button>
          <button class="role-btn" id="role-institution" onclick="selectRole('institution')">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
            <span class="role-title">Institution</span>
            <span class="role-desc">Hospital, clinic or healthcare provider</span>
          </button>
        </div>
      </div>
      <div class="error-msg" id="err-1"></div>
      <button class="btn btn-primary btn-full" onclick="goStep(2)">Continue</button>
    </div>

    <!-- Step 2: Basic Details (shared fields, institution-specific shown dynamically) -->
    <div class="form-step" id="step-2">
      <!-- Patient fields -->
      <div id="patient-fields">
        <div class="field-row">
          <div class="field">
            <label>First Name</label>
            <input type="text" id="first-name" placeholder="John" />
          </div>
          <div class="field">
            <label>Last Name</label>
            <input type="text" id="last-name" placeholder="Doe" />
          </div>
        </div>
        <div class="field">
          <label>Date of Birth</label>
          <input type="date" id="dob" />
        </div>
      </div>

      <!-- Institution fields (hidden until institution selected) -->
      <div id="institution-fields" style="display:none; flex-direction:column; gap:16px;">
        <div class="field">
          <label>Institution Name</label>
          <input type="text" id="inst-name" placeholder="Afriglobal Medicare Ltd" />
        </div>
        <div class="field">
          <label>Institution Type</label>
          <select id="inst-type">
            <option value="" disabled selected>Select type</option>
            <option>Hospital</option>
            <option>Clinic</option>
            <option>Diagnostic Centre</option>
            <option>Pharmacy</option>
            <option>Specialist Practice</option>
          </select>
        </div>
        <div class="field">
          <label>Contact Person</label>
          <input type="text" id="inst-contact" placeholder="Dr. Sarah Jenkins" />
        </div>
      </div>

      <div class="divider"><span>login credentials</span></div>

      <div class="field">
        <label>Email</label>
        <div class="input-wrap">
          <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/></svg>
          <input type="email" id="email" class="with-icon" placeholder="you@example.com" />
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          <input type="password" id="password" class="with-icon" placeholder="Min. 8 characters" />
        </div>
      </div>

      <div class="error-msg" id="err-2"></div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="goStep(1)">Back</button>
        <button class="btn btn-primary" onclick="goStep(3)">Continue</button>
      </div>
    </div>

    <!-- Step 3: Health profile (patients only) / Institution setup -->
    <div class="form-step" id="step-3">

      <!-- Patient health profile -->
      <div id="patient-health" style="display:flex; flex-direction:column; gap:16px;">
        <div class="field-row">
          <div class="field">
            <label>Height</label>
            <div class="input-wrap">
              <input type="number" id="height" placeholder="175" />
            </div>
            <span class="hint">cm</span>
          </div>
          <div class="field">
            <label>Weight</label>
            <div class="input-wrap">
              <input type="number" id="weight" placeholder="70" />
            </div>
            <span class="hint">kg</span>
          </div>
        </div>
        <div class="field">
          <label>Known Allergies</label>
          <input type="text" id="allergies" placeholder="Penicillin, Peanuts... or leave blank" />
        </div>
        <div class="field">
          <label>Medical Conditions</label>
          <input type="text" id="conditions" placeholder="Hypertension, Asthma... or leave blank" />
        </div>
        <div class="field">
          <label>Next of Kin — Name</label>
          <input type="text" id="nok-name" placeholder="Jane Doe" />
        </div>
        <div class="field">
          <label>Next of Kin — Phone</label>
          <input type="tel" id="nok-phone" placeholder="+234 800 000 0000" />
        </div>
      </div>

      <!-- Institution setup (shown instead for institution role) -->
      <div id="institution-setup" style="display:none; flex-direction:column; gap:16px;">
        <div class="field">
          <label>Institution Address</label>
          <textarea id="inst-address" rows="3" placeholder="1 Hospital Road, Victoria Island, Lagos"></textarea>
        </div>
        <div class="field">
          <label>Number of Providers</label>
          <select id="inst-size">
            <option value="" disabled selected>Approximate size</option>
            <option>1–5 providers</option>
            <option>6–20 providers</option>
            <option>21–100 providers</option>
            <option>100+ providers</option>
          </select>
        </div>
      </div>

      <div class="error-msg" id="err-3"></div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="goStep(2)">Back</button>
        <button class="btn btn-primary" id="submit-btn" onclick="handleSubmit()">
          <span id="submit-label">Create Account</span>
          <span class="spinner" style="display:none;" id="submit-spinner"></span>
        </button>
      </div>
    </div>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>

  </div>

  <script src="../shared/api.js"></script>
  <script src="../shared/app.js"></script>
  <script>
    let currentStep = 1;
    let selectedRole = null;

    function selectRole(role) {
      selectedRole = role;
      document.getElementById('role-patient').classList.toggle('selected', role === 'patient');
      document.getElementById('role-institution').classList.toggle('selected', role === 'institution');
    }

    function updateStepUI(step) {
      for (let i = 1; i <= 3; i++) {
        const num = document.getElementById('s' + i);
        const lbl = document.getElementById('sl' + i);
        num.classList.remove('active', 'done');
        lbl.classList.remove('active');
        if (i < step) { num.classList.add('done'); num.textContent = '✓'; }
        else if (i === step) { num.classList.add('active'); lbl.classList.add('active'); if (i > 1) num.textContent = i; }
        else { num.textContent = i; }
      }
    }

    function showStep(step) {
      document.querySelectorAll('.form-step').forEach(el => el.classList.remove('active'));
      document.getElementById('step-' + step).classList.add('active');
      currentStep = step;
      updateStepUI(step);

      if (step === 2) {
        const isInst = selectedRole === 'institution';
        document.getElementById('patient-fields').style.display = isInst ? 'none' : 'flex';
        document.getElementById('institution-fields').style.display = isInst ? 'flex' : 'none';
        if (isInst) {
          document.getElementById('institution-fields').style.flexDirection = 'column';
        }
        document.getElementById('patient-fields').style.flexDirection = 'column';
      }

      if (step === 3) {
        const isInst = selectedRole === 'institution';
        document.getElementById('patient-health').style.display = isInst ? 'none' : 'flex';
        document.getElementById('institution-setup').style.display = isInst ? 'flex' : 'none';
      }
    }

    function showErr(step, msg) {
      const el = document.getElementById('err-' + step);
      el.textContent = msg;
      el.classList.add('show');
    }
    function clearErr(step) {
      document.getElementById('err-' + step).classList.remove('show');
    }

    function goStep(step) {
      clearErr(currentStep);
      if (step === 2 && currentStep === 1) {
        if (!selectedRole) { showErr(1, 'Please select an account type to continue.'); return; }
      }
      if (step === 3 && currentStep === 2) {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value;
        if (!email || !pass) { showErr(2, 'Email and password are required.'); return; }
        if (pass.length < 8) { showErr(2, 'Password must be at least 8 characters.'); return; }
      }
      showStep(step);
    }

    async function handleSubmit() {
      clearErr(3);
      const btn = document.getElementById('submit-btn');
      const label = document.getElementById('submit-label');
      const spinner = document.getElementById('submit-spinner');

      label.style.opacity = '0';
      spinner.style.display = 'inline-block';
      btn.disabled = true;

      try {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (selectedRole === 'institution') {
          const payload = {
            full_name: document.getElementById('inst-contact').value.trim() || 'Provider',
            email,
            password,
            hospital_name: document.getElementById('inst-name').value.trim() || null,
            specialty: null,
            department: null,
          };
          await EaveAPI.signup(payload, 'provider');
          window.location.href = '../institution/provider-lookup.html';
        } else {
          const firstName = document.getElementById('first-name').value.trim();
          const lastName  = document.getElementById('last-name').value.trim();
          const dob       = document.getElementById('dob').value;

          if (!firstName || !lastName || !dob) {
            showErr(3, 'Name and date of birth are required.');
            label.style.opacity = '1'; spinner.style.display = 'none'; btn.disabled = false;
            return;
          }

          const payload = {
            full_name: `${firstName} ${lastName}`,
            email,
            password,
            date_of_birth: dob,
            next_of_kin_email: null,
            blood_type: null,
            location: null,
          };
          await EaveAPI.signup(payload, 'patient');
          window.location.href = '../user/dashboard.html';
        }
      } catch (err) {
        label.style.opacity = '1'; spinner.style.display = 'none'; btn.disabled = false;
        showErr(3, err.message || 'Signup failed. Please try again.');
      }
    }
  </script>
</body>
</html>
