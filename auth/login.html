<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Eave Health</title>
  <link rel="stylesheet" href="../shared/theme.css" />
  <style>
    body { overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }

    .auth-center {
      width: 100%; max-width: 420px;
      padding: 0 24px;
      animation: fadeIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .auth-brand {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 48px;
    }
    .auth-brand-icon {
      width: 32px; height: 32px;
      background: white; color: black;
      font-weight: 700; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
    }
    .auth-brand span { color: white; font-weight: 500; font-size: 15px; letter-spacing: 0.05em; }

    .auth-heading { margin-bottom: 40px; }
    .auth-heading h1 { font-size: 24px; font-weight: 600; color: white; letter-spacing: -0.02em; margin-bottom: 8px; }
    .auth-heading p { font-size: 14px; color: var(--text-muted); }

    .auth-form { display: flex; flex-direction: column; gap: 16px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); padding-left: 4px; }

    .role-select-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .role-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; padding: 16px 12px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-md); cursor: pointer; transition: var(--transition);
      color: var(--text-muted); font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .role-btn svg { width: 20px; height: 20px; }
    .role-btn:hover { background: #1a1a1a; border-color: #333; color: #d1d5db; }
    .role-btn.selected { border-color: #555; background: #1e1e1e; color: white; }
    .role-btn.selected svg { color: white; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 4px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }

    .auth-footer { margin-top: 24px; text-align: center; font-size: 13px; color: var(--text-muted); }
    .auth-footer a { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--border); transition: border-color 0.2s; }
    .auth-footer a:hover { border-color: #555; color: white; }

    .error-msg {
      font-size: 12px; color: #f87171; font-family: var(--font-mono);
      padding: 10px 14px; background: rgba(127,29,29,0.2);
      border: 1px solid rgba(127,29,29,0.4); border-radius: var(--radius-md);
      display: none;
    }
    .error-msg.show { display: block; }

    /* Loading state */
    .btn-primary .btn-text-label { transition: opacity 0.2s; }
    .btn-primary.loading .btn-text-label { opacity: 0; }
    .btn-primary .spinner { display: none; position: absolute; }
    .btn-primary.loading .spinner { display: inline-block; }
    .btn-primary { position: relative; }
  </style>
</head>
<body class="grid-bg">

  <div class="auth-center">

    <div class="auth-brand">
      <div class="auth-brand-icon">E</div>
      <span>Eave Health</span>
    </div>

    <div class="auth-heading">
      <h1>Welcome back</h1>
      <p>Sign in to continue to your dashboard.</p>
    </div>

    <div class="auth-form">

      <!-- Role Selection -->
      <div class="field">
        <label>I am a</label>
        <div class="role-select-group">
          <button class="role-btn" id="role-patient" onclick="selectRole('patient')">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            Patient
          </button>
          <button class="role-btn" id="role-provider" onclick="selectRole('provider')">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
            Institution
          </button>
        </div>
      </div>

      <div class="divider"><span>credentials</span></div>

      <!-- Email -->
      <div class="field">
        <label>Email</label>
        <div class="input-wrap">
          <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/></svg>
          <input type="email" id="email-input" class="with-icon" placeholder="you@example.com" autocomplete="email" />
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          <input type="password" id="password-input" class="with-icon" placeholder="••••••••" autocomplete="current-password" />
        </div>
      </div>

      <div class="error-msg" id="error-msg">Invalid credentials. Please try again.</div>

      <button class="btn btn-primary btn-full" id="signin-btn" onclick="handleSignIn()">
        <span class="btn-text-label">Sign In</span>
        <span class="spinner"></span>
      </button>

    </div>

    <div class="auth-footer">
      Don't have an account? <a href="/signup">Create one</a>
    </div>

  </div>

  <script src="../shared/api.js"></script>
  <script src="../shared/app.js"></script>
  <script>
    let selectedRole = null;

    function selectRole(role) {
      selectedRole = role;
      document.getElementById('role-patient').classList.toggle('selected', role === 'patient');
      document.getElementById('role-provider').classList.toggle('selected', role === 'provider');
    }

    async function handleSignIn() {
      const email = document.getElementById('email-input').value.trim();
      const password = document.getElementById('password-input').value;
      const errEl = document.getElementById('error-msg');
      const btn = document.getElementById('signin-btn');

      errEl.classList.remove('show');

      if (!selectedRole) {
        errEl.textContent = 'Please select your role to continue.';
        errEl.classList.add('show'); return;
      }
      if (!email || !password) {
        errEl.textContent = 'Email and password are required.';
        errEl.classList.add('show'); return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        await EaveAPI.login(email, password, selectedRole);

        if (selectedRole === 'provider') {
          EaveAPI.navigate('/provider');
        } else {
          EaveAPI.navigate('/dashboard');
        }
      } catch (err) {
        btn.classList.remove('loading');
        btn.disabled = false;
        errEl.textContent = err.message || 'Login failed. Please try again.';
        errEl.classList.add('show');
      }
    }

    // Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSignIn();
    });
  </script>
</body>
</html>
